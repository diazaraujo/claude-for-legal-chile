services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legalchile-backend
    # Producción: gunicorn multi-worker (runserver es mono-hilo → una query lenta cuelga todo).
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 4 --timeout 120 --access-logfile - --error-logfile -
    volumes:
      - ./backend:/app
      - ../data/_index:/index:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - CORPUS_INDEX_DIR=/index
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legalchile-frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: legalchile-db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=legalchile_db
      - POSTGRES_USER=legalchile_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalchile_user -d legalchile_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
