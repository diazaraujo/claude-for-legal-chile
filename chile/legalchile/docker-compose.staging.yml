services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: legalchile-backend-staging
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    env_file:
      - .env.staging
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.staging
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: legalchile-db-staging
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env.staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalchile_user -d legalchile_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
