<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .title { font-size: 24px; font-weight: 600; fill: #0a0a0a; }
    .subtitle { font-size: 13px; fill: #525252; }
    .metric-num { font-size: 38px; font-weight: 700; fill: #0a0a0a; }
    .metric-label { font-size: 12px; font-weight: 500; fill: #404040; }
    .metric-unit { font-size: 11px; fill: #737373; }
    .section-label { font-size: 11px; font-weight: 600; fill: #737373; letter-spacing: 1px; }
    .footer { font-size: 11px; fill: #737373; }
    .stroke { fill: none; stroke: #0a0a0a; stroke-width: 1.5; }
    .stroke-light { fill: none; stroke: #d4d4d4; stroke-width: 1; }
    .light-fill { fill: #fafafa; }
    .accent { fill: #d4a574; }
  </style>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" class="title">Claude Legal Chile · v0.4.0</text>
  <text x="450" y="65" text-anchor="middle" class="subtitle">Corpus normativo open source · Mantenido por Unholster · 2026-05-20</text>

  <!-- Sección CORPUS -->
  <text x="60" y="105" class="section-label">CORPUS NORMATIVO</text>
  <line x1="60" y1="115" x2="840" y2="115" class="stroke-light"/>

  <rect x="60" y="130" width="240" height="110" rx="4" class="light-fill stroke"/>
  <text x="180" y="170" text-anchor="middle" class="metric-num">12.465</text>
  <text x="180" y="195" text-anchor="middle" class="metric-label">Capa 1 — Catálogo</text>
  <text x="180" y="215" text-anchor="middle" class="metric-unit">Todas las normas BCN/SPARQL</text>

  <rect x="330" y="130" width="240" height="110" rx="4" class="light-fill stroke"/>
  <text x="450" y="170" text-anchor="middle" class="metric-num">~11.800</text>
  <text x="450" y="195" text-anchor="middle" class="metric-label">Capa 2 — Estructura</text>
  <text x="450" y="215" text-anchor="middle" class="metric-unit">Parseo XML LeyChile</text>

  <rect x="600" y="130" width="240" height="110" rx="4" fill="none" stroke="#d4a574" stroke-width="2"/>
  <text x="720" y="170" text-anchor="middle" class="metric-num">160</text>
  <text x="720" y="195" text-anchor="middle" class="metric-label">Capa 3 — Análisis curado</text>
  <text x="720" y="215" text-anchor="middle" class="metric-unit">Perfiles con disclaimer + cross-links</text>

  <!-- Sección ORQUESTACIÓN -->
  <text x="60" y="275" class="section-label">ORQUESTACIÓN OPERATIVA</text>
  <line x1="60" y1="285" x2="840" y2="285" class="stroke-light"/>

  <rect x="60" y="300" width="180" height="90" rx="4" class="light-fill stroke"/>
  <text x="150" y="335" text-anchor="middle" class="metric-num">9</text>
  <text x="150" y="358" text-anchor="middle" class="metric-label">Perfiles por rama</text>
  <text x="150" y="375" text-anchor="middle" class="metric-unit">laboral · societario · civil · …</text>

  <rect x="260" y="300" width="180" height="90" rx="4" class="light-fill stroke"/>
  <text x="350" y="335" text-anchor="middle" class="metric-num">5</text>
  <text x="350" y="358" text-anchor="middle" class="metric-label">Skills transversales</text>
  <text x="350" y="375" text-anchor="middle" class="metric-unit">diag · citas · plazos · MPD · pruebas</text>

  <rect x="460" y="300" width="180" height="90" rx="4" class="light-fill stroke"/>
  <text x="550" y="335" text-anchor="middle" class="metric-num">13</text>
  <text x="550" y="358" text-anchor="middle" class="metric-label">Ejemplos resueltos</text>
  <text x="550" y="375" text-anchor="middle" class="metric-unit">9 ramas cubiertas</text>

  <rect x="660" y="300" width="180" height="90" rx="4" class="light-fill stroke"/>
  <text x="750" y="335" text-anchor="middle" class="metric-num">63</text>
  <text x="750" y="358" text-anchor="middle" class="metric-label">Auto-revisiones técnicas</text>
  <text x="750" y="375" text-anchor="middle" class="metric-unit">~200 hallazgos pre-validación</text>

  <!-- Sección PROCESO -->
  <text x="60" y="425" class="section-label">PROCESO DE VALIDACIÓN LEGAL</text>
  <line x1="60" y1="435" x2="840" y2="435" class="stroke-light"/>

  <rect x="60" y="450" width="380" height="60" rx="4" class="light-fill stroke"/>
  <text x="250" y="478" text-anchor="middle" class="metric-num">14</text>
  <text x="250" y="498" text-anchor="middle" class="metric-label">Issues abiertos para validadores legales</text>

  <rect x="460" y="450" width="380" height="60" rx="4" class="light-fill stroke"/>
  <text x="650" y="478" text-anchor="middle" class="metric-num">CI ✅</text>
  <text x="650" y="498" text-anchor="middle" class="metric-label">Workflow audit: 0 errores · 0 warnings · 0 links rotos</text>

  <!-- Footer -->
  <text x="450" y="545" text-anchor="middle" class="footer">Apache 2.0 · github.com/diazaraujo/claude-for-legal-chile · v0.4.0</text>
</svg>
