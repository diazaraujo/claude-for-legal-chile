# Golden test suite — queries jurídicamente significativas con
# resultados esperados en el corpus actual. Verifica regressions al
# cambiar índice / chunking / re-ranking.
#
# Schema:
#   query: texto de búsqueda
#   source: filtro de fuente (opcional)
#   sources: lista de fuentes (opcional, OR)
#   year_from/year_to: rango temporal (opcional)
#   expect_top: cuántos resultados verificar (default 1)
#   expect_any:
#     - path_contains: substring que algún path en top_N debe contener
#     - or:
#       - path_contains: alternativa A
#       - path_contains: alternativa B
#   min_score: BM25 score mínimo (más cercano a 0 = mejor; default -50)
#   articulos_mode: si está presente (hybrid|semantic), corre búsqueda
#     vectorial por ARTÍCULO; expect_any.path_contains se compara contra
#     "leychile_code|articulo_num|snippet". leychile_code opcional filtra.

cases:
  - id: ley_proteccion_datos_basica
    query: sobre protección de la vida privada
    sources: ["leychile-ley"]
    exclude_modificadoras: true
    expect_top: 3
    expect_any:
      # Ley 19.628 BASE — idNorma 141599 (no 199093 que es modificadora)
      - path_contains: "/141599.xml.txt"

  - id: codigo_trabajo_articulo
    query: código del trabajo articulo 159 161 causales término
    sources: ["leychile-cod", "leychile-dfl"]
    expect_top: 5
    expect_any:
      # Código del Trabajo — DFL 1 de 2002 — idNorma 207436 (en /dfl/, no /cod/)
      - path_contains: "/207436.xml.txt"

  - id: ley_libre_competencia
    query: decreto ley 211 libre competencia tribunal
    sources: ["leychile-dl"]
    expect_top: 3
    expect_any:
      # DL 211 de 1973 — Libre Competencia — idNorma 5872 (verified)
      - path_contains: "/5872.xml.txt"

  - id: tdlc_caso_farmacias
    query: "colusión farmacias precio"
    sources: ["tdlc"]
    expect_top: 5
    expect_any:
      # Sentencia 119/2012 sentencia colusión farmacias (FASA, Cruz Verde, SalcoBrand)
      - path_contains: "sentencia-119-2012"

  - id: tdlc_caso_supermercados
    query: "supermercados precio carne pollo cerdo"
    sources: ["tdlc"]
    expect_top: 5
    expect_any:
      # Sentencia 167/2019 caso colusión carne
      - path_contains: "sentencia-167-2019"
      - path_contains: "sentencia-167-2018"

  - id: tdpi_patente_invencion
    query: "patente invención bioquímica rechazo"
    source: "tdpi"
    expect_top: 3
    expect_any:
      - path_contains: "PATENTE-DE-INVENCION-BIOQUIMICA"

  - id: tribunal_ambiental_contaminacion
    query: "contaminación atmosférica material particulado"
    source: "tribunales-ambientales"
    expect_top: 5
    expect_any:
      - path_contains: "tribunal-12"
      - path_contains: "tribunal-3"

  - id: diario_oficial_reciente_uf
    query: "Unidad de Fomento reajuste"
    source: "diario-oficial"
    year_from: "2024"
    expect_top: 5
    expect_any:
      - path_contains: "diario-oficial/2024/"
      - path_contains: "diario-oficial/2025/"
      - path_contains: "diario-oficial/2026/"

  - id: tc_moderno_inaplicabilidad
    query: "inaplicabilidad por inconstitucionalidad código orgánico"
    source: "tc-moderno"
    expect_top: 3
    expect_any:
      - path_contains: "STC_Rol_N"

  - id: cmf_circular_bancaria
    query: "circular norma bancos sociedades anónimas"
    source: "cmf"
    expect_top: 5
    expect_any:
      - path_contains: "cmf/"

  - id: sii_circular_impuesto
    query: "impuesto al valor agregado IVA contribuyente"
    source: "sii"
    expect_top: 5
    expect_any:
      - path_contains: "sii/"

  - id: cross_source_libre_competencia
    query: "libre competencia adquisición control"
    sources: ["tdlc", "fne", "leychile-dl"]
    expect_top: 10
    expect_any:
      - path_contains: "tdlc/"
      - path_contains: "fne/"

  # --- Búsqueda semántica/híbrida por artículo (embeddings bge-m3) ---

  - id: articulo_semantic_fuero_maternal
    # Lenguaje natural sin overlap léxico exacto con el articulado:
    # FTS doc-level no lo resolvería; el vector sí.
    query: "puede el empleador despedir a una trabajadora embarazada"
    articulos_mode: semantic
    expect_top: 8
    expect_any:
      # Fuero maternal — art. del período de embarazo en el corpus laboral.
      - path_contains: "embarazo"
      - path_contains: "embarazada"

  - id: articulo_hybrid_codigo_trabajo_jornada
    # Híbrido filtrado al Código del Trabajo vigente (DFL 1 2002 = 207436).
    query: "duración máxima de la jornada ordinaria semanal"
    articulos_mode: hybrid
    leychile_code: 207436
    expect_top: 8
    expect_any:
      - path_contains: "207436|"

  - id: articulo_semantic_vigentes_only
    # vigentes_only debe excluir la norma 6850 (derogada en docs_norma) que
    # SÍ aparece sin el filtro, sin perder los artículos de fuero maternal.
    query: "puede el empleador despedir a una trabajadora embarazada"
    articulos_mode: semantic
    vigentes_only: true
    expect_top: 8
    expect_none:
      - path_contains: "6850|"
    expect_any:
      - path_contains: "embarazo"

  - id: considerando_tc_igualdad
    # Búsqueda semántica de considerandos (razonamiento TC) sobre igualdad
    # ante la ley — query en lenguaje natural.
    query: "vulneración del derecho a la igualdad ante la ley por trato discriminatorio"
    considerandos_mode: hybrid
    source: tc
    expect_top: 6
    expect_any:
      - path_contains: "igualdad"

  - id: doctrina_responsabilidad_estado
    # Búsqueda semántica de doctrina universitaria (sin FTS).
    query: "responsabilidad extracontractual del Estado por falta de servicio"
    doctrina: true
    expect_top: 5
    expect_any:
      - path_contains: "responsabilidad"

  - id: articulo_superseded_codigo_trabajo
    # 3471 (Código del Trabajo 1994) está marcado superseded_by 207436 (2002).
    # vigentes_only debe ocultar el 3471 histórico y traer el 207436 vigente.
    query: "causales de terminación del contrato de trabajo"
    articulos_mode: hybrid
    vigentes_only: true
    expect_top: 8
    expect_none:
      - path_contains: "3471|"
    expect_any:
      - path_contains: "207436|"
